{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<style>
  .auth-wrap { display:flex; justify-content:center; align-items:flex-start; padding-top:3rem; }
  .auth-card { width:100%; max-width:420px; }
  .auth-logo { text-align:center; margin-bottom:1.75rem; }
  .auth-logo h1 { font-size:2rem; font-weight:900; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .auth-logo p  { color:var(--text-muted); font-size:.9rem; margin-top:.3rem; }
  .auth-card .card { padding:2rem; }
  .auth-footer { text-align:center; margin-top:1.1rem; font-size:.88rem; color:var(--text-muted); }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🤫 CodeWhisper</h1>
      <p>Your Socratic DSA learning companion</p>
    </div>

    <div class="card">
      <h2 style="font-size:1.25rem;margin-bottom:1.4rem;font-weight:700;">Welcome back</h2>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          <div class="form-error" id="email-err"></div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
          <div class="form-error" id="pass-err"></div>
        </div>
        <div class="form-error" id="form-err" style="margin-bottom:.75rem;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:.75rem;" id="login-btn">
          Sign in
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // If already logged in, redirect to dashboard
  if (CW.isLoggedIn()) window.location.href = '/dashboard';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('login-btn');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;

    // Clear errors
    document.getElementById('form-err').textContent = '';

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    const { ok, data } = await CW.api('POST', '/auth/login', { email, password: pass });

    if (ok) {
      CW.setAuth(data.access_token, data.user);
      window.location.href = '/dashboard';
    } else {
      document.getElementById('form-err').textContent = data.error || 'Login failed. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
{% endblock %}
