services:
  - type: web
    name: codewhisper
    runtime: python
    buildCommand: pip install -r codewhisper/requirements.txt
    startCommand: cd codewhisper && gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: codewhisper-db
          property: connectionString
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: codewhisper-db
    databaseName: codewhisper
    user: codewhisper_user
    plan: free
