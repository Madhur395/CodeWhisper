# ─────────────────────────────────────────────
# CodeWhisper — Docker Compose
# Spins up: Flask App + PostgreSQL + Redis
# Phase 10 will finalize production config.
# ─────────────────────────────────────────────

version: '3.9'

services:
  web:
    build: .
    container_name: codewhisper_web
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: codewhisper_db
    environment:
      POSTGRES_DB: codewhisper_db
      POSTGRES_USER: codewhisper_user
      POSTGRES_PASSWORD: codewhisper_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codewhisper_user -d codewhisper_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codewhisper_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
    driver: local
